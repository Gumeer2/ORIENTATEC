<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - Orientación Vocacional</title>
    <meta name="description" content="Resultados de tu test de orientación vocacional.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="page-resultados" class="page-resultados-layout">
        <div class="image-box-fija">
            <img src="static/res.png" alt="Ilustración Resultado PC">
        </div>
        <div class="contenedor-resultado">
            <div class="result-box">
                <h2>¡Felicidades!</h2>
                <p>Tu área vocacional predominante es:</p>
                <div class="header-area">
                    <img id="result-img-izq" src="" alt="Icono Izquierda" class="area-image-lateral">
                    <div class="area-nombre" id="result-area-nombre"></div>
                    <img id="result-img-der" src="" alt="Icono Derecha" class="area-image-lateral">
                </div>
                <p>Te sugerimos explorar las siguientes carreras:</p>
                <ul id="result-carreras-list"></ul>
            </div>
            <a href="#" id="result-btn-detalles" class="btn-detalles">Ver más detalles</a>
            <a href="menu.html" class="btn-detalles" style="background-color: #0b3d91;">Volver al Menú</a>
        </div>
    </div>

<script src="js/app.js"></script>
</body>
</html>
